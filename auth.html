<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UktcDex | Auth</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="logo"><a href="index.html">UKTC<span>DEX</span></a></div>
    </nav>

    <main class="auth-container">
        <div class="auth-box">
            <p class="subtitle">ПРОФИЛ</p>
            <h1 id="auth-title">РЕГИСТРАЦИЯ</h1>
            <form id="auth-form">
                <div class="input-group" id="name-group">
                    <label>ИМЕ</label>
                    <input type="text" name="name" placeholder="Въведете вашето име">
                </div>
                <div class="input-group">
                    <label>ИМЕЙЛ АДРЕС</label>
                    <input type="email" name="email" required placeholder="email@example.com">
                </div>
                <div class="input-group">
                    <label>ПАРОЛА</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn" class="btn-dark-wide">РЕГИСТРАЦИЯ</button>
            </form>
            <div class="auth-footer">
                <span id="footer-text">ВЕЧЕ ИМАТЕ ПРОФИЛ? <a href="#" id="toggle-auth">ВХОД &rarr;</a></span>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
