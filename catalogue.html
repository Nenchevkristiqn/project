<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDex | Catalogue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">AUTO<span>DEX</span></a></div>
        <div class="nav-menu"><a href="index.html">INDEX</a><a href="catalogue.html" class="active-link">CATALOGUE</a></div>
        <div class="nav-auth"></div>
    </nav>

    <section class="filter-section">
        <div class="container">
            <p class="subtitle">THE CATALOGUE</p>
            <h2 class="section-serif-title">Every entry, indexed.</h2>
            <div class="search-bar"><input type="text" id="search-input" placeholder="Search by name, marque, or tagline..."></div>
            <div class="filters">
                <div class="filter-item">
                    <label>MARQUE</label>
                    <select id="marque-filter">
                        <option value="all">All marques</option>
                        <option value="bmw">BMW</option>
                        <option value="mercedes">Mercedes</option>
                        <option value="audi">Audi</option>
                        <option value="volkswagen">Volkswagen</option>
                        <option value="ford">Ford</option>
                        <option value="toyota">Toyota</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>CATEGORY</label>
                    <select id="category-filter">
                        <option value="all">All categories</option>
                        <option value="suv">SUV</option>
                        <option value="sedans">Sedans</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>YEAR</label>
                    <select id="year-filter">
                        <option value="all">All years</option>
                        <option value="2026">2026</option>
                        <option value="2020">2020</option>
                        <option value="2016">2016</option>
                    </select>
                </div>
            </div>
            <div class="results-count" id="results-count">12 ENTRIES</div>
        </div>
    </section>

    <div class="container">
        <div class="car-grid-4col" id="car-container">
            <article class="car-card"><div class="car-image"></div><div class="car-info"><p class="car-meta">MARQUE • 2024</p><h3>Model Name</h3><div class="car-specs"><div class="spec"><span>HP</span><strong>500</strong></div><div class="spec"><span>0-60</span><strong>3.5s</strong></div></div></div></article>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
