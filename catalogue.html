<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UktcDex | Catalogue</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">UKTC<span>DEX</span></a></div>
        <div class="nav-menu"><a href="index.html">НАЧАЛО</a><a href="catalogue.html" class="active-link">КАТАЛОГ</a></div>
        <div class="nav-auth"></div>
    </nav>

    <section class="filter-section">
        <div class="container">
            <h2 class="section-serif-title">КАТАЛОГ НА АВТОМОБИЛИ</h2>
            <div class="search-bar"><input type="text" id="search-input" placeholder="Търсене..."></div>
            <div class="filters">
                <div class="filter-item">
                    <label>МАРКА</label>
                    <select id="marque-filter">
                        <option value="all">ВСИЧКИ</option>
                        <option value="bmw">BMW</option>
                        <option value="mercedes">Mercedes</option>
                        <option value="audi">Audi</option>
                        <option value="volkswagen">Volkswagen</option>
                        <option value="ford">Ford</option>
                        <option value="toyota">Toyota</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>КАТЕГОРИЯ</label>
                    <select id="category-filter">
                        <option value="all">ВСИЧКИ</option>
                        <option value="suv">SUV</option>
                        <option value="sedans">Sedans</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>ГОДИНА</label>
                    <select id="year-filter">
                        <option value="all">ВСИЧКИ</option>
                        <option value="2026">СЛЕД 2026</option>
                        <option value="2020">СЛЕД 2020</option>
                        <option value="2016">СЛЕД 2016</option>
                    </select>
                </div>
            </div>
            <div class="results-count" id="results-count">12 ENTRIES</div>
        </div>
    </section>

    <div class="container">
        <div class="car-grid-4col" id="car-container"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
